name: Tests
on:
  push:
    branches:
      - main
  pull_request:
jobs: 
  app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Install dependencies
        run: dotnet restore
      - name: Build project
        run: dotnet build --no-restore
      - name: Setup HTTPS certificate for CI
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -DnsName "localhost" -CertStoreLocation "Cert:\CurrentUser\My"
          $pfxPath = Join-Path $env:RUNNER_TEMP "ci-https-cert.pfx"
          $cerPath = Join-Path $env:RUNNER_TEMP "ci-https-cert.cer"
          $password = [Guid]::NewGuid().ToString("N")
          $securePassword = ConvertTo-SecureString -String $password -AsPlainText -Force

          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $securePassword | Out-Null
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Import-Certificate -FilePath $cerPath -CertStoreLocation "Cert:\CurrentUser\Root" | Out-Null

          "ASPNETCORE_Kestrel__Certificates__Default__Path=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASPNETCORE_Kestrel__Certificates__Default__Password=$password" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Run tests
        run: dotnet test --no-restore --verbosity normal
